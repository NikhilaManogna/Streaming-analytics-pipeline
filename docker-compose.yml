services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: rta-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready zookeeper:2181 40 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - analytics-net

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: rta-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 40 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - analytics-net

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.3
    container_name: rta-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists
      --topic events
      --partitions 3
      --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --describe --topic events
      "
    networks:
      - analytics-net

  postgres:
    image: postgres:16-alpine
    container_name: rta-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - analytics-net

  spark:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: rta-spark
    hostname: spark
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
    command: >
      /opt/spark/bin/spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.7,org.postgresql:postgresql:42.7.3
      /app/processing/spark_streaming.py
    volumes:
      - ./:/app
    networks:
      - analytics-net

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: rta-producer
    hostname: producer
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
    command: python3 /app/producer/producer.py
    volumes:
      - ./:/app
    networks:
      - analytics-net

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: rta-dashboard
    hostname: dashboard
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    networks:
      - analytics-net

networks:
  analytics-net:
    driver: bridge

volumes:
  postgres-data: